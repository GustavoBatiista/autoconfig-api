# --- Produção: MySQL (credenciais via ambiente; valores default alinham ao compose.yaml local) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mydatabase?createDatabaseIfNotExist=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}

# Em produção real prefira validate/none + Flyway; override com SPRING_JPA_HIBERNATE_DDL_AUTO
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}

spring.h2.console.enabled=true

server.forward-headers-strategy=framework