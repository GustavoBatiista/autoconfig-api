spring.application.name=autoconfig

# Perfil padrão ao rodar sem SPRING_PROFILES_ACTIVE (ex.: IDE / spring-boot:run)
spring.profiles.default=dev
#Esse comando desativa o docker compose quando o aplicativo é executado em modo de desenvolvimento, usando assim o h2 database localmente
spring.docker.compose.enabled=false
# JWT (em produção defina JWT_SECRET / jwt.secret via ambiente)
jwt.secret=${JWT_SECRET:CHAVE_BEM_LONGA_COM_PELO_MENOS_32_CARACTERES_SEGURA}
jwt.expiration=${JWT_EXPIRATION:86400000}


springdoc.swagger-ui.tagsSorter=alpha
