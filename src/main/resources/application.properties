spring.application.name=autoconfig
# Schema: atualiza colunas (incl. auditoria) a partir das entidades. Para DDL versionado, use Flyway (db/migration).
spring.jpa.hibernate.ddl-auto=update
# Flyway desligado por padrão: V1__add_audit_columns.sql exige tabelas já existentes. Ative após baseline se preferir migrações SQL.
spring.flyway.enabled=false
# mínimo 32 bytes (256 bits) para HS256 — use um segredo longo em base64 ou string longa
jwt.secret=CHAVE_BEM_LONGA_COM_PELO_MENOS_32_CARACTERES_SEGURA
# expiração em ms (ex.: 24h)
jwt.expiration=86400000
